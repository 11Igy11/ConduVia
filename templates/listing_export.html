<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{TITLE}}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background: #ffffff;
            color: #111827;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 28px;
        }

        .meta {
            margin-bottom: 20px;
            color: #4b5563;
            line-height: 1.6;
        }

        .cards {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .card {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 12px 14px;
            min-width: 140px;
            background: #f9fafb;
        }

        .card-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .card-value {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
            background: #ffffff;
        }

        th, td {
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
            white-space: nowrap;
        }

        th {
            background: #1f2937;
            color: #ffffff;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        tr:hover {
            background: #eef2ff;
        }
    </style>
</head>
<body>
    <h1>{{TITLE}}</h1>

    <div class="meta">
        <div><strong>Dataset:</strong> {{DATASET}}</div>
        <div><strong>Exported:</strong> {{EXPORTED_AT}}</div>
        <div><strong>View Mode:</strong> {{VIEW_MODE}}</div>
    </div>

    <div class="cards">
        <div class="card">
            <div class="card-label">Rows</div>
            <div class="card-value">{{ROWS_COUNT}}</div>
        </div>
        <div class="card">
            <div class="card-label">Columns</div>
            <div class="card-value">{{COLUMNS_COUNT}}</div>
        </div>
        <div class="card">
            <div class="card-label">Files</div>
            <div class="card-value">{{FILES_COUNT}}</div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    {{TABLE_HEADERS}}
                </tr>
            </thead>
            <tbody>
                {{TABLE_ROWS}}
            </tbody>
        </table>
    </div>
</body>
</html>
